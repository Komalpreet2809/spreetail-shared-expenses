# Render blueprint: Django API + managed Postgres.
# Deploy: Render Dashboard -> New -> Blueprint -> connect this repo.
# After it provisions, set the GROQ_API_KEY env var (marked sync:false below).

databases:
  - name: spreetail-expenses-db
    plan: free
    databaseName: expenses
    user: expenses

services:
  - type: web
    name: spreetail-expenses-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python manage.py bootstrap_demo && gunicorn config.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: spreetail-expenses-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: BASE_CURRENCY
        value: INR
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false  # set this manually in the Render dashboard (secret)
